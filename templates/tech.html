<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tech Stack | AI Learning Assistant</title>

    <link rel="stylesheet" href="../static/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
   
</head>

<body>

<section id="tech">
  <div class="container">
    <div class="sec-head reveal">
      <span class="sec-tag"><i class="fa-solid fa-layer-group"></i>Tech Stack</span>
      <h2 class="sec-title">Built with <span class="grad">Modern Technologies</span></h2>
      <p class="sec-desc">A robust full-stack architecture designed for scalability, performance, and an exceptional learning experience.</p>
    </div>
    <div class="tech-grid">
      <div class="tech-item reveal">
        <div class="ic" style="color:#e34f26"><i class="fa-brands fa-html5"></i></div>
        <h4>HTML5</h4>
        <p>Semantic Markup</p>
      </div>
      <div class="tech-item reveal">
        <div class="ic" style="color:#1572b6"><i class="fa-brands fa-css3-alt"></i></div>
        <h4>CSS3</h4>
        <p>3D Styling</p>
      </div>
      <div class="tech-item reveal">
        <div class="ic" style="color:#f7df1e"><i class="fa-brands fa-js"></i></div>
        <h4>JavaScript</h4>
        <p>Interactivity</p>
      </div>
      <div class="tech-item reveal">
        <div class="ic" style="color:#fff"><i class="fa-brands fa-python"></i></div>
        <h4>Flask</h4>
        <p>Backend API</p>
      </div>
      <div class="tech-item reveal">
        <div class="ic" style="color:#00758f"><i class="fa-solid fa-database"></i></div>
        <h4>MySQL</h4>
        <p>Database</p>
      </div>
      <div class="tech-item reveal">
        <div class="ic" style="color:#8b5cf6"><i class="fa-solid fa-brain"></i></div>
        <h4>AI / NLP</h4>
        <p>GPT-4 Engine</p>
      </div>
    </div>
  </div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../static/script.js"></script>

</body>
</html>
